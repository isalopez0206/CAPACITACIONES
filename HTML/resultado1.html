<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Resultados de Evaluación </title>

    <!-- FUENTE MODERNA -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="../CSS/resultado1.css">
</head>
<body>
    
<header class="header-resultados">
    <h1>Resultados de tu Evaluación </h1>  
    <p>Visualiza tu desempeño general y por módulos</p>  
</header>

<main class="contenedor-principal">

    <!-- RESUMEN -->
    <section class="card-resumen" aria-labelledby="resumen-titulo">
        <header>
            <h2 id="resumen-titulo" class="resumen-titulo">Resultado General</h2>
        </header>

        <article class="resultado-total">
            <p id="porcentajeFinal" class="porcentaje">0%</p>
            <p class="descripcion">Resultado total obtenido</p>
        </article>
    </section>

    <!-- GRAFICO -->
    <section aria-labelledby="grafico-titulo">
        <header>
            <h2 id="grafico-titulo">Desempeño por Módulo</h2>
        </header>

        <figure class="grafico-container">
            <canvas id="graficoResultados"></canvas>
            <figcaption>
                porcentaje obtenido en cada módulo (cada módulo contiene 3 preguntas).
            </figcaption>
        </figure>
    </section>
</main>

<footer class="footer-resultados">
    <nav>
        <a href="home1.html" class="boton-volver">
            Volver al Inicio
        </a>
    </nav>
</footer>

<script src="evaluation.js"></script>
</body>
</html>
