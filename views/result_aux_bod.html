<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado Auxiliar Logistico</title>

    <!-- FUENTE MODERNA -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="../CSS/result_aux_bod.css">
</head>
<body>
    <header class="header-auxbod">
        <h1>Resultados de la Evaluación</h1>
        <p>(Auxiliar De Bodega)</p>
    </header>

    <main class="container-auxbod">

        <!-- RESUMEN -->
         <section class="card-auxbod" aria-labelledby="resumen-titulo">
            <header>
                <h2 id="resumen-auxbod" class="resumen-auxbod">Resultado General</h2>
            </header>

            <article class="resultado-total-auxbod">
                <p id="porcentajeFinal-auxbod" class="porcentaje-auxbod">0%</p>
                <p class="descripcion-auxbod">Resultado Total Obtenido</p>
            </article>
         </section>

        <!-- GRAFICO -->
        <section aria-labelledby="grafico-titulo">
            <header>
                <h2 id="grafico-container">Desempeño por Módulo</h2>
            </header>

            <figure class="grafico-container-auxbod">
                <canvas id="graficoResultados"></canvas>
                <figcaption>
                    Porcentaje obtenido en cada pregunta.
                </figcaption>
            </figure>
        </section>
    </main>

    <footer class="footer-resultados-auxbod">
        <nav>
            <a href="cards_capacitacion.html" class="boton-volver-auxbod">
                Volver al inicio
            </a>
        </nav>
    </footer>

    <script src="../controllers/evaluacion_modulos.js"></script>
</body>
</html>
