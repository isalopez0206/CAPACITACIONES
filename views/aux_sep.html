<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/aux_sep.css">
    <title>Inducción Auxiliar de Separación</title>
</head>
<body>
    <main class="sep-modulo">
        <header class="sep-modulo__header">
            <h1>Inducción Auxiliar de Separación</h1>
            <p>Observa atentamente cada imagen antes de realizar el cuestionario</p>
        </header>

        <section class="sep-carousel" aria-label="Galeria de inducción">
            <div class="sep-carousel__slides">

                <figure class="sep-slide active">
                    <img src="../IMG/IMG_AUX-SEP/1.png" alt="auxiliar de separacion 1">
                    <figcaption>Responsabilidades del Cargo</figcaption>
                </figure>
                <figure class="sep-slide">
                    <img src="../IMG/IMG_AUX-SEP/2.png" alt="auxiliar de separacion 2">
                    <figcaption>Funciones de 1er Nivel</figcaption>
                </figure>
                <figure class="sep-slide">
                    <img src="../IMG/IMG_AUX-SEP/3.png" alt="auxiliar de separacion 3">
                    <figcaption>Procesos del Auxiliar de Separación</figcaption>
                </figure>
                <figure class="sep-slide">
                    <img src="../IMG/IMG_AUX-SEP/4.png" alt="auxiliar de separacion 4">
                    <figcaption>Responsabilidades y Equipos</figcaption>
                </figure>
                <figure class="sep-slide">
                    <img src="../IMG/IMG_AUX-SEP/5.png" alt="auxiliar de separacion 5">
                    <figcaption>Contacto Interno y Externo</figcaption>
                </figure>
                <figure class="sep-slide">
                    <img src="../IMG/IMG_AUX-SEP/6.png" alt="auxiliar de separacion 6">
                    <figcaption>Normas de conducta y Presentacion Personal</figcaption>
                </figure>
                <figure class="sep-slide">
                    <img src="../IMG/IMG_AUX-SEP/7.png" alt="auxiliar de separacion 7">
                    <figcaption>Deberes del Auxiliar de Separación</figcaption>
                </figure>
                <figure class="sep-slide">
                    <img src="../IMG/IMG_AUX-SEP/8.png" alt="auxiliar de separacion 8">
                    <figcaption>Horarios</figcaption>
                </figure>
                <figure class="sep-slide">
                    <img src="../IMG/IMG_AUX-SEP/9.png" alt="auxiliar de separacion 9">
                    <figcaption>Garantizar la Separación Organización y Preparación </figcaption>
                </figure>
            </div>

            <nav class="sep-carousel__controls">
                <button id="sep-prev" aria-label="Imagen anterior">Anterior</button>

                <span id="sep-contador">1/9</span>

                <button id="sep-next" aria-label="Imagen siguiente">Siguiente</button>
            </nav>
        </section>

        <section class="sep-evaluacion">
            <!-- Formulario que envía al evaluador cuando se hace submit -->
            <form id="sep-evalForm">
                <button id="sep-btnEvaluacion" type="button" disabled>Iniciar evaluación
                </button>
            </form>
        </section>
    </main>

    <script src="../controllers/aux_log.js"></script>
</body>
</html>
