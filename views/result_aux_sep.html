<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado Auxiliar Logistico</title>

    <!-- FUENTE MODERNA -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="../CSS/result_aux_sep.css">
</head>
<body>
    <header class="header-auxsep">
        <h1>Resultados de la Evaluación</h1>
        <p>(Auxiliar de Separación)</p>
    </header>

    <main class="container-auxsep">

        <!-- RESUMEN -->
         <section class="card-auxsep" aria-labelledby="resumen-titulo">
            <header>
                <h2 id="resumen-auxsep" class="resumen-auxsep">Resultado General</h2>
            </header>

            <article class="resultado-total-auxsep">
                <p id="porcentajeFinal-auxsep" class="porcentaje-auxsep">0%</p>
                <p class="descripcion-auxsep">Resultado Total Obtenido</p>
            </article>
         </section>

        <!-- GRAFICO -->
        <section aria-labelledby="grafico-titulo">
            <header>
                <h2 id="grafico-container">Desempeño por Módulo</h2>
            </header>

            <figure class="grafico-container-auxsep">
                <canvas id="graficoResultados"></canvas>
                <figcaption>
                    Porcentaje obtenido en cada pregunta.
                </figcaption>
            </figure>
        </section>
    </main>

    <footer class="footer-resultados-auxsep">
        <nav>
            <a href="cards_capacitacion.html" class="boton-volver-auxsep">
                Volver al inicio
            </a>
        </nav>
    </footer>

    <script src="../controllers/evaluacion_modulos.js"></script>
</body>
</html>
