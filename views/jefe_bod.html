<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/jefe_bod.css">
    <title>Induccion Jefe de Bodega</title>
</head>
<body>

    <main class="jefe-modulo">
        <header class="jefe-modulo__header">
            <h1>Inducción - Jefe de Bodega</h1>
            <p>Observa atentamente cada imagen antes de realizar el cuestionario</p>
        </header>

        <section class="jefe-carousel" aria-label="Galeria de inducción">
            <div class="jefe-carousel__slides">
                <figure class="jefe-slide active">
                    <img src="../IMG/IMG_JEFE-BOD/1.png" alt="jefe de bodega 1">
                    <figcaption>Responsabilidades del Cargo</figcaption>
                </figure>

                <figure class="jefe-slide">
                    <img src="../IMG/IMG_JEFE-BOD/2.png" alt="jefe de bodega 2">
                    <figcaption>Dirección y Supervisión de Bodega</figcaption>
                </figure>

                <figure class="jefe-slide">
                    <img src="../IMG/IMG_JEFE-BOD/3.png" alt="jefe de bodega 3">
                    <figcaption>Coordinación de Despachos y Rutas</figcaption>
                </figure>

                <figure class="jefe-slide">
                    <img src="../IMG/IMG_JEFE-BOD/4.png" alt="jefe de bodega 4">
                    <figcaption>Gestion de Proveedores</figcaption>
                </figure>
                <figure class="jefe-slide">
                    <img src="../IMG/IMG_JEFE-BOD/5.png" alt="jefe de bodega 5">
                    <figcaption>Gestion de Stock y Rotación  </figcaption>
                </figure>
                <figure class="jefe-slide">
                    <img src="../IMG/IMG_JEFE-BOD/6.png" alt="jefe de bodega 6">
                    <figcaption>Indicadores, Informes y Reportes</figcaption>
                </figure>
                <figure class="jefe-slide">
                    <img src="../IMG/IMG_JEFE-BOD/7.png" alt="jefe de bodega 7">
                    <figcaption>Cierres de mes Bodega e Inventario</figcaption>
                </figure>
                <figure class="jefe-slide">
                    <img src="../IMG/IMG_JEFE-BOD/8.png" alt="jefe de bodega 8">
                    <figcaption>Responsabilidades</figcaption>
                </figure>
                <figure class="jefe-slide">
                    <img src="../IMG/IMG_JEFE-BOD/9.png" alt="jefe de bodega 9">
                    <figcaption>Normas y Contacto Interno y Externo</figcaption>
                </figure>
            </div>

            <nav class="jefe-carousel__controls">
                <button id="jefe-prev" aria-label="Imagen Anterior">
                    Anterior
                </button>

                <span id="jefe-contador">1 / 9</span>

                <button id="jefe-next" aria-label="Imagen Siguiente">
                    Siguiente
                </button>
            </nav>
        </section>

        <section class="jefe-evaluacion">
            <form id="jefe-evalForm">
                <button id="jefe-btnEvaluacion" type="button" disabled>
                    Iniciar Evaluación
                </button>
            </form>
        </section>
    </main>

    <script src="../controllers/aux_log.js"></script>
    
</body>
</html>
